syntax = "proto3";

package aethelum.core;

// 神经脉冲消息包 - 在神经元间传递的信息包
message NeuralImpulseProto {
  // 基本字段
  string session_id = 1;           // 会话ID，用于追踪
  string action_intent = 2;        // 下一个处理队列名称（路由键）
  string source_agent = 3;         // 上一个处理该消息的Agent标识符
  string input_source = 4;         // 消息来源标识（USER, SYSTEM, API等）
  
  // 内容字段
  google.protobuf.Any content = 5;  // 消息内容，支持多种格式
  map<string, string> metadata = 6; // 元数据字典
  repeated string routing_history = 7; // 消息流经的Agent序列
  
  // 时间戳
  int64 timestamp = 8;             // 创建时间戳（Unix时间戳）
  
  // 基础新增字段
  int32 priority = 9;              // 消息优先级（0-4，0为最高优先级）
  int64 expires_at = 10;           // 消息过期时间（Unix时间戳，0表示永不过期）
  int32 compression = 11;          // 内容压缩类型（0=无压缩，1=ZLIB，2=GZIP）
  string version = 12;             // 消息格式版本
  int32 status = 13;               // 消息状态（0=已创建，1=已入队，2=处理中，3=已完成，4=处理失败，5=已过期，6=已取消）
  string content_hash = 14;        // 内容哈希值，用于验证内容完整性
  
  // 扩展字段
  string correlation_id = 15;      // 关联ID，用于追踪相关消息
  string parent_session_id = 16;    // 父会话ID，用于消息链追踪
  repeated string child_session_ids = 17; // 子会话ID列表
  string batch_id = 18;            // 批处理ID
  int32 batch_index = 19;          // 批处理中的索引
  int32 batch_total = 20;          // 批处理总数
  
  // 验证和兼容性字段
  ValidationInfo validation_info = 21; // 验证信息
  PerformanceStats performance_stats = 22; // 性能统计
  CompatibilityInfo compatibility_info = 23; // 兼容性信息
  
  // 安全和审计字段
  bool is_encrypted = 24;          // 是否加密
  string encryption_key_id = 25;   // 加密密钥ID
  bool requires_audit = 26;       // 是否需要审计
  string audit_level = 27;         // 审计级别（low, medium, high, critical）
  repeated string audit_trail = 28; // 审计轨迹
  
  // 资源管理字段
  int32 max_retry_count = 29;      // 最大重试次数
  int32 current_retry_count = 30;  // 当前重试次数
  int64 last_retry_time = 31;      // 最后重试时间
  string retry_strategy = 32;       // 重试策略（exponential, linear, fixed）
  map<string, string> resource_limits = 33; // 资源限制
}

// 请求内容 - 用于用户输入和AI响应
message RequestContent {
  string user_input = 1;           // 用户输入文本
  string response_content = 2;     // AI响应内容
  string content_type = 3;         // 内容类型（text/plain, text/markdown等）
  string language = 4;             // 语言代码（zh, en等）
  map<string, string> context = 5; // 上下文信息
  repeated string attachments = 6; // 附件列表（文件路径或URL）
  
  // 新增字段
  string request_id = 7;           // 请求唯一标识
  string caesar_shift = 8;         // 审计编码偏移
  string nonce = 9;                // 审计随机数
  string model_name = 10;          // 处理模型名称
  int64 processing_time = 11;      // 处理耗时（毫秒）
  int32 token_count = 12;          // Token使用量
  string audit_result = 13;        // 审计结果
  string audit_score = 14;         // 审计评分
  map<string, string> audit_metadata = 15; // 审计元数据
  bool is_sensitive = 16;          // 是否包含敏感内容
  string encryption_method = 17;   // 加密方式
  bytes encrypted_data = 18;       // 加密数据（如果使用）
}

// 文本内容 - 简单的文本消息
message TextContent {
  string text = 1;                 // 文本内容
  string content_type = 2;         // 内容类型
  string language = 3;             // 语言代码
}

// 二进制内容 - 用于文件、图片等二进制数据
message BinaryContent {
  bytes data = 1;                  // 二进制数据
  string mime_type = 2;            // MIME类型
  string filename = 3;             // 文件名
  int64 size = 4;                   // 数据大小（字节）
}

// 结构化内容 - 用于结构化数据
message StructuredContent {
  string schema_type = 1;          // 结构类型名称
  google.protobuf.Struct data = 2; // 结构化数据
}

// 错误信息 - 用于错误处理
message ErrorInfo {
  int32 error_code = 1;            // 错误代码
  string error_message = 2;        // 错误消息
  string error_source = 3;         // 错误来源
  map<string, string> details = 4; // 错误详情
  
  // 新增字段
  string error_category = 5;       // 错误类别（system, business, network等）
  int64 error_timestamp = 6;        // 错误发生时间戳
  string stack_trace = 7;           // 错误堆栈信息
  string recovery_action = 8;       // 推荐恢复动作
  bool is_recoverable = 9;         // 是否可恢复
  int32 retry_count = 10;          // 已重试次数
  int32 max_retries = 11;           // 最大重试次数
  string correlation_id = 12;       // 关联ID，用于错误追踪
}

// 导入Any类型
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

// 消息验证信息
message ValidationInfo {
  bool is_valid = 1;               // 是否验证通过
  repeated string validation_errors = 2; // 验证错误列表
  string schema_version = 3;       // 使用的schema版本
  map<string, string> validation_metadata = 4; // 验证元数据
  int64 validation_timestamp = 5;    // 验证时间戳
}

// 性能统计信息
message PerformanceStats {
  int64 creation_time = 1;         // 创建时间
  int64 processing_start_time = 2;  // 处理开始时间
  int64 processing_end_time = 3;    // 处理结束时间
  int32 queue_wait_time = 4;       // 队列等待时间（毫秒）
  int32 execution_time = 5;         // 执行时间（毫秒）
  int32 serialization_time = 6;    // 序列化时间（微秒）
  int32 deserialization_time = 7;  // 反序列化时间（微秒）
  int32 memory_usage = 8;          // 内存使用量（字节）
  map<string, int64> custom_metrics = 9; // 自定义指标
}

// 消息兼容性信息
message CompatibilityInfo {
  string min_compatible_version = 1; // 最低兼容版本
  string max_compatible_version = 2; // 最高兼容版本
  repeated string deprecated_fields = 3; // 已弃用字段
  repeated string new_fields = 4;    // 新增字段
  bool requires_migration = 5;      // 是否需要迁移
}