name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY_URL: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: git.internal.coro.link/syrkos/bun-git:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bunx tsc

      # --- dev 分支: 发布为 next (pre-release) ---
      - name: Bump prerelease version
        if: gitea.ref == 'refs/heads/dev'
        run: npm version prerelease --preid dev --no-git-tag-version

      - name: Publish prerelease (next)
        if: gitea.ref == 'refs/heads/dev'
        run: |
          export BUN_AUTH_TOKEN="${{ secrets.PACKAGE_TOKEN }}"
          echo "//git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${BUN_AUTH_TOKEN}" > ~/.npmrc
          bun publish --tag next --access public --no-git-checks --registry "${{ env.REGISTRY_URL }}"

      # --- main 分支 / tag: 发布为 latest (正式版) ---
      - name: Publish release (latest)
        if: gitea.ref == 'refs/heads/main' || startsWith(gitea.ref, 'refs/tags/v')
        run: |
          export BUN_AUTH_TOKEN="${{ secrets.PACKAGE_TOKEN }}"
          echo "//git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${BUN_AUTH_TOKEN}" > ~/.npmrc
          bun publish --access public --no-git-checks --registry "${{ env.REGISTRY_URL }}"
