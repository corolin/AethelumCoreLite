name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY_URL: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: git.internal.coro.link/syrkos/bun-git:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build
      - name: Publish prerelease (next)
        if: gitea.ref == 'refs/heads/dev'
        env:
          TARGET_REGISTRY: "https://git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/"
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          rm -f .npmrc ~/.npmrc
          npm config set --location project "//git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/:_authToken" "${{ secrets.PACKAGE_TOKEN }}"
          npm publish --tag next --access public --registry "${{ env.TARGET_REGISTRY }}"

      # --- main 分支 / tag: 发布为 latest (正式版) ---
      - name: Publish release (latest)
        if: gitea.ref == 'refs/heads/main' || startsWith(gitea.ref, 'refs/tags/v')
        env:
          TARGET_REGISTRY: "https://git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/"
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          rm -f .npmrc ~/.npmrc
          npm config set --location project "//git.internal.coro.link/api/packages/${{ gitea.repository_owner }}/npm/:_authToken" "${{ secrets.PACKAGE_TOKEN }}"
          npm publish --access public --registry "${{ env.TARGET_REGISTRY }}"
