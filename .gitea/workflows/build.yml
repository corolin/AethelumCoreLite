name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY_URL: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: oven/bun:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bunx tsc

      - name: Publish to Gitea Package Registry
        if: gitea.event_name == 'push'
        run: |
          echo "//${{ gitea.server_host }}/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${{ secrets.PACKAGE_TOKEN }}" > ~/.npmrc
          bun publish --access public --no-git-checks
        env:
          npm_config_registry: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm/"
