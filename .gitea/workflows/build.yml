# Gitea Actions：actions/checkout 需要 PATH 中有 git。
# oven/bun 镜像默认无 git → checkout 会误走 GitHub tarball API → getaddrinfo ENOTFOUND。
# 方案 A：本文件采用「oven/bun 容器 + 首步 apt 安装 git」。
# 方案 B：不用容器，runs-on ubuntu-latest + setup-bun（少一次 apt，见历史提交）。
name: Build & Publish

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY_URL: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: oven/bun:latest
      options: --network host
    steps:
      - name: Install git (for actions/checkout on Gitea)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bunx tsc

      # --- dev 分支: 发布为 next (pre-release) ---
      - name: Bump prerelease version
        if: gitea.ref == 'refs/heads/dev' && gitea.event_name == 'push'
        run: bun version prerelease --preid dev

      - name: Publish prerelease (next)
        if: gitea.ref == 'refs/heads/dev' && gitea.event_name == 'push'
        run: |
          echo "//${{ gitea.server_host }}/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${{ secrets.PACKAGE_TOKEN }}" > ~/.npmrc
          bun publish --access public --no-git-checks --tag next
        env:
          npm_config_registry: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm/"

      # --- main 分支 / tag: 发布为 latest (正式版) ---
      - name: Publish release (latest)
        if: (gitea.ref == 'refs/heads/main' || startsWith(gitea.ref, 'refs/tags/v')) && gitea.event_name == 'push'
        run: |
          echo "//${{ gitea.server_host }}/api/packages/${{ gitea.repository_owner }}/npm/:_authToken=${{ secrets.PACKAGE_TOKEN }}" > ~/.npmrc
          bun publish --access public --no-git-checks
        env:
          npm_config_registry: "${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/npm/"
